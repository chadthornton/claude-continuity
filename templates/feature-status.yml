features:
  example-feature:
    status: planned         # exploring | building | polishing | parked | planned
    phase: 1                # Optional. Enables cross-feature sequencing (lower phases first).
    next: Define scope
    summary: Brief description of this feature area
    next_steps: []          # Ordered list of next actions. Plain strings or {step, done} objects.
    # next_steps with completion tracking (enables resumed-session progress display):
    #   - step: "Do the first thing"
    #     done: false
    #   - step: "Do the second thing"
    #     done: false

# Workflows are repeatable operations, not features to build.
# They appear in the dashboard alongside features but have different fields.
workflows:
  # example-workflow:
  #   summary: What this workflow does
  #   trigger: When to suggest it (cadence, condition, or manual)
  #   steps: []             # Ordered steps to execute
  #   last_run: null        # ISO date of last execution
  #   artifacts: []         # Key files/scripts involved

in_progress: null           # Set to task description when mid-stream, null when clean

last_session:
  date: null
  summary: null
  feature: null
  blind_spots: []             # Written by retrospect step in wrap-up/checkpoint
